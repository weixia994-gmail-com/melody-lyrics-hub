<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>10 Music Videos - Shuttle Player</title>
  <style>
    body{margin:0;background:#0b1020;color:#eaf1ff;font-family:Arial,sans-serif}
    .wrap{max-width:1200px;margin:16px auto;padding:0 12px}
    .card{background:#121a2b;border:1px solid #2b3854;border-radius:14px;padding:12px}
    video{width:100%;max-height:68vh;background:#000;border-radius:12px}
    .row{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0}
    .btn{padding:9px 13px;border-radius:10px;border:1px solid #344465;background:#1a2640;color:#fff;cursor:pointer}
    .btn.on{background:#2e6bff;border-color:#2e6bff}
    .meta{font-size:14px;color:#c2d0f0}
    .title{font-size:20px;font-weight:700;margin:8px 0}
    .sub{font-size:12px;color:#93a3c8}
    .queue{margin-top:10px;max-height:240px;overflow:auto}
    .item{padding:8px;border:1px solid #2c3955;border-radius:10px;margin-bottom:6px}
    .item.active{border-color:#5ea2ff;background:#0f223f}
  </style>
</head>
<body>
  <script>
    // Only taiwise domain should use shuttle player.
    // Other domains (e.g. camwise/github.io) go to hub page.
    if (!/10-music-videos\.taiwise\.dpdns\.org$/i.test(location.hostname)) {
      location.replace('./hub.html');
    }
  </script>
  <div class="wrap">
    <h2>🎵 10-Music Shuttle Player</h2>
    <div class="sub">默认随机播放（Shuffle）｜支持上一首/下一首/循环</div>

    <div class="card">
      <video id="player" controls playsinline preload="metadata"></video>
      <div class="title" id="title">加载中...</div>
      <div class="meta" id="meta">-</div>

      <div class="row">
        <button class="btn" id="prev">⏮ Prev</button>
        <button class="btn" id="play">▶ Play</button>
        <button class="btn" id="next">⏭ Next</button>
        <button class="btn on" id="shuffle">🔀 Shuffle: ON</button>
        <button class="btn" id="loop">🔁 Loop One: OFF</button>
        <a class="btn" id="yt" href="#" target="_blank" rel="noopener" style="text-decoration:none">YouTube</a>
      </div>

      <div class="queue" id="queue"></div>
    </div>
  </div>

<script>
(async function(){
  const v=document.getElementById('player');
  const elTitle=document.getElementById('title');
  const elMeta=document.getElementById('meta');
  const q=document.getElementById('queue');
  const bPrev=document.getElementById('prev');
  const bPlay=document.getElementById('play');
  const bNext=document.getElementById('next');
  const bShuffle=document.getElementById('shuffle');
  const bLoop=document.getElementById('loop');
  const yt=document.getElementById('yt');

  const res=await fetch('./songs_metadata.json?t='+Date.now());
  const songs=await res.json();

  let idx=Math.floor(Math.random()*songs.length);
  let shuffle=true;
  let loopOne=false;
  const history=[];

  function pickNextIndex(){
    if (!shuffle) return (idx+1)%songs.length;
    if (songs.length<=1) return idx;
    let n=idx;
    while(n===idx) n=Math.floor(Math.random()*songs.length);
    return n;
  }

  function pickPrevIndex(){
    if (history.length>0) return history.pop();
    return (idx-1+songs.length)%songs.length;
  }

  function renderQueue(){
    q.innerHTML='';
    for(let i=0;i<12;i++){
      const j=shuffle?Math.floor(Math.random()*songs.length):(idx+i+1)%songs.length;
      const s=songs[j];
      const d=document.createElement('div');
      d.className='item'+(j===idx?' active':'');
      d.innerHTML=`<div>${s.slug} · ${s.title}</div><div class="sub">${s.videoFile}</div>`;
      q.appendChild(d);
    }
  }

  function setSong(newIdx,autoPlay=true){
    idx=(newIdx+songs.length)%songs.length;
    const s=songs[idx];
    v.src=s.videoUrl||s.downloadUrl;
    elTitle.textContent=s.title||s.slug;
    elMeta.textContent=`${s.slug} · ${s.videoFile}`;
    yt.href=s.youtubeUrl||('#');
    renderQueue();
    if (autoPlay) v.play().catch(()=>{});
  }

  v.addEventListener('ended',()=>{
    if(loopOne){ setSong(idx,true); return; }
    history.push(idx);
    setSong(pickNextIndex(),true);
  });

  v.onerror=()=>{
    const s=songs[idx];
    if(s.youtubeUrl) window.open(s.youtubeUrl,'_blank','noopener');
  };

  bPrev.onclick=()=>setSong(pickPrevIndex(),true);
  bNext.onclick=()=>{ history.push(idx); setSong(pickNextIndex(),true); };
  bPlay.onclick=()=> v.paused ? v.play().catch(()=>{}) : v.pause();

  bShuffle.onclick=()=>{
    shuffle=!shuffle;
    bShuffle.classList.toggle('on',shuffle);
    bShuffle.textContent=`🔀 Shuffle: ${shuffle?'ON':'OFF'}`;
  };

  bLoop.onclick=()=>{
    loopOne=!loopOne;
    bLoop.classList.toggle('on',loopOne);
    bLoop.textContent=`🔁 Loop One: ${loopOne?'ON':'OFF'}`;
  };

  setSong(idx,true);
})();
</script>
</body>
</html>
