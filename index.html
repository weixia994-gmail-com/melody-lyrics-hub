<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>极简循环播放器</title>
  <style>
    html,body{margin:0;background:#000;height:100%;font-family:Arial,sans-serif;color:#fff}
    .wrap{height:100%;display:flex;flex-direction:column}
    video{width:100%;height:calc(100% - 72px);background:#000;object-fit:contain}
    .bar{height:72px;display:flex;gap:10px;align-items:center;justify-content:center;background:#0b0b0b;border-top:1px solid #222;flex-wrap:wrap}
    button{padding:10px 16px;border:1px solid #333;background:#111;color:#fff;border-radius:8px;font-size:15px;cursor:pointer}
    button:hover{background:#1a1a1a}
    .playing{background:#1f6feb;border-color:#3b82f6}
  </style>
</head>
<body>
  <div class="wrap">
    <video id="v" controls playsinline preload="metadata"></video>
    <div class="bar">
      <button id="prev">上一首</button>
      <button id="play">播放</button>
      <button id="next">下一首</button>
      <button id="mode">模式：顺序循环</button>
    </div>
  </div>
<script>
  let tracks=[];
  let i=0, shuffle=false;
  const v=document.getElementById('v');
  const playBtn=document.getElementById('play');
  const modeBtn=document.getElementById('mode');

  function syncPlayBtn(){ if(v.paused){playBtn.textContent='播放';playBtn.classList.remove('playing')} else {playBtn.textContent='暂停';playBtn.classList.add('playing')} }
  function playIdx(idx,autoplay=true){ if(!tracks.length) return; i=(idx+tracks.length)%tracks.length; v.src=tracks[i]; if(autoplay) v.play().catch(()=>{}); }
  function next(){ if(!tracks.length) return; if(shuffle){ let n=i; while(tracks.length>1 && n===i) n=Math.floor(Math.random()*tracks.length); playIdx(n,true);} else playIdx(i+1,true); }
  function prev(){ if(!tracks.length) return; if(shuffle){ let n=i; while(tracks.length>1 && n===i) n=Math.floor(Math.random()*tracks.length); playIdx(n,true);} else playIdx(i-1,true); }
  function togglePlay(){ if(v.paused) v.play().catch(()=>{}); else v.pause(); }
  function toggleMode(){ shuffle=!shuffle; modeBtn.textContent='模式：' + (shuffle ? '随机播放' : '顺序循环'); }

  document.getElementById('next').onclick=next;
  document.getElementById('prev').onclick=prev;
  playBtn.onclick=togglePlay;
  modeBtn.onclick=toggleMode;
  v.addEventListener('ended',next);
  v.addEventListener('play',syncPlayBtn);
  v.addEventListener('pause',syncPlayBtn);
  v.addEventListener('loadeddata',syncPlayBtn);

  fetch('./songs_metadata.json',{cache:'no-store'}).then(r=>r.json()).then(data=>{
    tracks=(data||[]).map(x=>x.downloadUrl).filter(Boolean).slice(0,10);
    if(!tracks.length) throw new Error('no tracks');
    playIdx(0,false); syncPlayBtn();
  }).catch(()=>{ document.body.insertAdjacentHTML('beforeend','<div style="position:fixed;left:10px;bottom:8px;color:#f66;font-size:12px">加载播放列表失败</div>'); });
</script>
</body>
</html>
