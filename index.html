<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>10 Music Videos - Shuttle Player</title>
  <style>
    body{margin:0;background:#0b1020;color:#eaf1ff;font-family:Arial,sans-serif}
    .wrap{max-width:100vw;margin:0;padding:10px}
    .card{background:#121a2b;border:1px solid #2b3854;border-radius:12px;padding:10px;min-height:96vh}
    video{width:100%;height:84vh;background:#000;border-radius:10px;object-fit:contain}
    .row{display:flex;gap:12px;flex-wrap:wrap;margin:12px 0;justify-content:center}
    .btn{padding:10px 16px;border-radius:10px;border:1px solid #344465;background:#1a2640;color:#fff;cursor:pointer;font-size:15px}
    .btn.on{background:#2e6bff;border-color:#2e6bff}
      </style>
</head>
<body>
  <script>
    // Only taiwise domain should use shuttle player.
    // Other domains (e.g. camwise/github.io) go to hub page.
    if (!/10-music-videos\.taiwise\.dpdns\.org$/i.test(location.hostname)) {
      location.replace('./hub.html');
    }
  </script>
  <div class="wrap">
    <div class="card">
      <video id="player" controls playsinline preload="metadata"></video>
      <div class="row">
        <button class="btn" id="prev">⏮ Prev</button>
        <button class="btn" id="play">⏸ Pause</button>
        <button class="btn" id="next">⏭ Next</button>
        <button class="btn on" id="shuffle">🔀 Shuffle</button>
        <button class="btn" id="loop">🔁 Loop</button>
        <button class="btn" id="mode10">🎯 10 Songs</button>
      </div>

      
    </div>
  </div>

<script>
(async function(){
  const v=document.getElementById('player');
  const bPrev=document.getElementById('prev');
  const bPlay=document.getElementById('play');
  const bNext=document.getElementById('next');
  const bShuffle=document.getElementById('shuffle');
  const bLoop=document.getElementById('loop');
  const bMode10=document.getElementById('mode10');

  const res=await fetch('./songs_metadata.json?t='+Date.now());
  const songs=await res.json();

  let mode10=false;
  let pool=songs;
  let idx=Math.floor(Math.random()*pool.length);
  let shuffle=true;
  let loopOne=false;
  const history=[];

  function rebuildPool(){
    pool = mode10 ? songs.slice(0,10) : songs;
    if (idx >= pool.length) idx = 0;
    history.length = 0;
  }

  function pickNextIndex(){
    if (!shuffle) return (idx+1)%pool.length;
    if (pool.length<=1) return idx;
    let n=idx;
    while(n===idx) n=Math.floor(Math.random()*pool.length);
    return n;
  }

  function pickPrevIndex(){
    if (history.length>0) return history.pop();
    return (idx-1+pool.length)%pool.length;
  }

  function setSong(newIdx,autoPlay=true){
    idx=(newIdx+pool.length)%pool.length;
    const s=pool[idx];
    v.src=s.videoUrl||s.downloadUrl;
    if (autoPlay) {
      v.play().then(()=>{ bPlay.textContent='⏸ Pause'; }).catch(()=>{});
    }
  }

  v.addEventListener('ended',()=>{
    if(loopOne){ setSong(idx,true); return; }
    history.push(idx);
    setSong(pickNextIndex(),true);
  });

  v.onerror=()=>{
    const s=pool[idx];
    if(s.youtubeUrl) window.open(s.youtubeUrl,'_blank','noopener');
  };
  v.addEventListener('play', ()=>{ bPlay.textContent='⏸ Pause'; });
  v.addEventListener('pause', ()=>{ bPlay.textContent='▶ Play'; });

  bPrev.onclick=()=>setSong(pickPrevIndex(),true);
  bNext.onclick=()=>{ history.push(idx); setSong(pickNextIndex(),true); };
  bPlay.onclick=()=>{ if(v.paused){ v.play().catch(()=>{}); bPlay.textContent='⏸ Pause'; } else { v.pause(); bPlay.textContent='▶ Play'; } };

  bShuffle.onclick=()=>{
    shuffle=!shuffle;
    bShuffle.classList.toggle('on',shuffle);
  };

  bLoop.onclick=()=>{
    loopOne=!loopOne;
    bLoop.classList.toggle('on',loopOne);
  };

  bMode10.onclick=()=>{
    mode10=!mode10;
    bMode10.classList.toggle('on',mode10);
    rebuildPool();
    idx=Math.floor(Math.random()*pool.length);
    setSong(idx,true);
  };

  rebuildPool();
  setSong(idx,true);
  bPlay.textContent = "⏸ Pause";
})();
</script>
</body>
</html>
