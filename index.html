<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Melody Lyrics Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module" crossorigin src="./assets/index-DENqj6VS.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-C6G_3qQV.css">
  </head>
  <body>
    <div id="root"></div>

    <!-- Lightweight preview modal (non-invasive patch on top of static build) -->
    <div id="preview-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:9999;align-items:center;justify-content:center;padding:24px;">
      <div style="position:relative;width:min(1100px,96vw);max-height:92vh;">
        <button id="preview-close" aria-label="Close" style="position:absolute;top:-40px;right:0;background:#111827;color:#fff;border:1px solid #374151;border-radius:10px;padding:6px 12px;cursor:pointer;">关闭</button>
        <video id="preview-video" controls playsinline style="width:100%;max-height:92vh;background:#000;border-radius:12px;" preload="metadata"></video>
      </div>
    </div>

    <script>
      (function () {
        const modal = document.getElementById('preview-modal');
        const video = document.getElementById('preview-video');
        const closeBtn = document.getElementById('preview-close');

        function openPreview(url) {
          if (/youtube\.com\/watch\?v=|youtu\.be\//i.test(url)) {
            window.open(url, '_blank', 'noopener');
            return;
          }
          video.src = url;
          modal.style.display = 'flex';
          video.currentTime = 0;
          video.play().catch(() => {});
        }

        function closePreview() {
          video.pause();
          video.removeAttribute('src');
          video.load();
          modal.style.display = 'none';
        }

        // Click triangle/cover area => preview
        // Click Video button => keep original download behavior
        function enhanceCards() {
          const cards = document.querySelectorAll('div.group');
          cards.forEach((card) => {
            const cover = card.querySelector('.aspect-video');
            const links = Array.from(card.querySelectorAll('a[href]'));
            const videoBtn = links.find(a => /youtube\.com\/watch\?v=|youtu\.be\//i.test(a.getAttribute('href')||''))
              || links.find(a => /\.mp4($|\?)/i.test(a.getAttribute('href')||''))
              || links[0];
            if (!cover || !videoBtn || cover.dataset.enhanced === '1') return;

            const src = videoBtn.getAttribute('href');
            cover.dataset.enhanced = '1';
            cover.style.position = 'relative';
            cover.style.overflow = 'hidden';
            cover.style.cursor = 'pointer';

            // thumbnail in square: legacy tracks use jpg poster; current tracks use looping video
            const legacyMatch = src.match(/\/downloads\/legacy\/(s\d{2})\.mp4/i);
            if (legacyMatch) {
              const key = legacyMatch[1];
              cover.innerHTML = `
                <img src="./downloads/legacy/${key}.jpg" alt="thumb" style="width:100%;height:100%;object-fit:cover;opacity:.9;background:#111827" />
                <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:linear-gradient(to top, rgba(0,0,0,.24), rgba(0,0,0,.08));">
                  <div style="width:58px;height:58px;border-radius:999px;border:2px solid rgba(255,255,255,.75);display:flex;align-items:center;justify-content:center;backdrop-filter:blur(1px)">
                    <div style="margin-left:4px;width:0;height:0;border-top:10px solid transparent;border-bottom:10px solid transparent;border-left:16px solid rgba(255,255,255,.95)"></div>
                  </div>
                </div>
              `;
            } else if (/youtube\.com\/watch\?v=|youtu\.be\//i.test(src)) {
              cover.innerHTML = `
                <div style="width:100%;height:100%;background:linear-gradient(135deg,#111827,#1f2937);"></div>
                <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:linear-gradient(to top, rgba(0,0,0,.24), rgba(0,0,0,.08));">
                  <div style="width:58px;height:58px;border-radius:999px;border:2px solid rgba(255,255,255,.75);display:flex;align-items:center;justify-content:center;backdrop-filter:blur(1px)">
                    <div style="margin-left:4px;width:0;height:0;border-top:10px solid transparent;border-bottom:10px solid transparent;border-left:16px solid rgba(255,255,255,.95)"></div>
                  </div>
                </div>
              `;
            } else {
              cover.innerHTML = `
                <video muted playsinline loop preload="metadata" style="width:100%;height:100%;object-fit:cover;opacity:.86;background:#111827">
                  <source src="${src}" type="video/mp4" />
                </video>
                <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:linear-gradient(to top, rgba(0,0,0,.24), rgba(0,0,0,.08));">
                  <div style="width:58px;height:58px;border-radius:999px;border:2px solid rgba(255,255,255,.75);display:flex;align-items:center;justify-content:center;backdrop-filter:blur(1px)">
                    <div style="margin-left:4px;width:0;height:0;border-top:10px solid transparent;border-bottom:10px solid transparent;border-left:16px solid rgba(255,255,255,.95)"></div>
                  </div>
                </div>
              `;
              const thumbVideo = cover.querySelector('video');
              thumbVideo && thumbVideo.play().catch(() => {});
            }

            cover.addEventListener('click', function () {
              openPreview(src);
            });
          });
        }

        // initial + retry for React render timing
        enhanceCards();
        const timer = setInterval(enhanceCards, 1200);
        setTimeout(() => clearInterval(timer), 20000);

        closeBtn.addEventListener('click', closePreview);
        modal.addEventListener('click', function (e) {
          if (e.target === modal) closePreview();
        });
        document.addEventListener('keydown', function (e) {
          if (e.key === 'Escape' && modal.style.display !== 'none') closePreview();
        });
      })();
    </script>
  </body>
</html>
