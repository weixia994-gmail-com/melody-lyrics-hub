<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>10 Music Videos - Shuttle Player</title>
  <style>
    body{margin:0;background:#0b1020;color:#eaf1ff;font-family:Arial,sans-serif}
    .wrap{max-width:1200px;margin:16px auto;padding:0 12px}
    .card{background:#121a2b;border:1px solid #2b3854;border-radius:14px;padding:12px}
    video{width:100%;max-height:68vh;background:#000;border-radius:12px}
    .row{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0}
    .btn{padding:9px 13px;border-radius:10px;border:1px solid #344465;background:#1a2640;color:#fff;cursor:pointer}
    .btn.on{background:#2e6bff;border-color:#2e6bff}
      </style>
</head>
<body>
  <script>
    // Only taiwise domain should use shuttle player.
    // Other domains (e.g. camwise/github.io) go to hub page.
    if (!/10-music-videos\.taiwise\.dpdns\.org$/i.test(location.hostname)) {
      location.replace('./hub.html');
    }
  </script>
  <div class="wrap">
    <div class="card">
      <video id="player" controls playsinline preload="metadata"></video>
      <div class="row">
        <button class="btn" id="prev">⏮</button>
        <button class="btn" id="play">▶</button>
        <button class="btn" id="next">⏭</button>
        <button class="btn on" id="shuffle">🔀</button>
        <button class="btn" id="loop">🔁</button>
        </div>

      
    </div>
  </div>

<script>
(async function(){
  const v=document.getElementById('player');
  const bPrev=document.getElementById('prev');
  const bPlay=document.getElementById('play');
  const bNext=document.getElementById('next');
  const bShuffle=document.getElementById('shuffle');
  const bLoop=document.getElementById('loop');

  const res=await fetch('./songs_metadata.json?t='+Date.now());
  const songs=await res.json();

  let idx=Math.floor(Math.random()*songs.length);
  let shuffle=true;
  let loopOne=false;
  const history=[];

  function pickNextIndex(){
    if (!shuffle) return (idx+1)%songs.length;
    if (songs.length<=1) return idx;
    let n=idx;
    while(n===idx) n=Math.floor(Math.random()*songs.length);
    return n;
  }

  function pickPrevIndex(){
    if (history.length>0) return history.pop();
    return (idx-1+songs.length)%songs.length;
  }

  function setSong(newIdx,autoPlay=true){
    idx=(newIdx+songs.length)%songs.length;
    const s=songs[idx];
    v.src=s.videoUrl||s.downloadUrl;
    if (autoPlay) {
      v.play().then(()=>{ bPlay.textContent='⏸'; }).catch(()=>{});
    }
  }

  v.addEventListener('ended',()=>{
    if(loopOne){ setSong(idx,true); return; }
    history.push(idx);
    setSong(pickNextIndex(),true);
  });

  v.onerror=()=>{
    const s=songs[idx];
    if(s.youtubeUrl) window.open(s.youtubeUrl,'_blank','noopener');
  };
  v.addEventListener('play', ()=>{ bPlay.textContent='⏸'; });
  v.addEventListener('pause', ()=>{ bPlay.textContent='▶'; });

  bPrev.onclick=()=>setSong(pickPrevIndex(),true);
  bNext.onclick=()=>{ history.push(idx); setSong(pickNextIndex(),true); };
  bPlay.onclick=()=>{ if(v.paused){ v.play().catch(()=>{}); bPlay.textContent='⏸'; } else { v.pause(); bPlay.textContent='▶'; } };

  bShuffle.onclick=()=>{
    shuffle=!shuffle;
    bShuffle.classList.toggle('on',shuffle);
  };

  bLoop.onclick=()=>{
    loopOne=!loopOne;
    bLoop.classList.toggle('on',loopOne);
  };

  setSong(idx,true);
  bPlay.textContent = "⏸";
})();
</script>
</body>
</html>
